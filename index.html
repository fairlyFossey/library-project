<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLibrary</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div>Page Name!</div>
        <button id="create-book-btn">Add Book</button>
    </header>

    <div class="main-content-cntr">
        <div class="book-collection-cntr"></div>
    </div>

    <footer>
        <div>This is a footer</div>
    </footer>

    <dialog id="new-book-dialog" closedby="any">
        <form method="dialog">
            <label for="title">Book Title:</label>
            <input type="text" id="title" name="title">

            <label for="author">Author's Name:</label>
            <input type="text" id="author" name="author">

            <label for="page-count">Page count:</label>
            <input type="number" id="pages" name="pages">

            <label for="has-finished">I've read it already:</label>
            <input type="checkbox" id="read" name="read">

            <button id="close-dialog-btn">Submit?</button>
        </form>
    </dialog>
    
</body>
</html>
