<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLibrary</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="page-branding-cntr">
            <img class="logo" src="./img/logo.svg" alt="" height="150px" width="auto">
            <div class="page-name-wrpr">
                <div class="page-name">My</div>
                <div class="page-name">Library</div>
            </div>
        </div>
        <div class="new-book-btn-cntr">
            <div class="btn-wrpr">
                <button id="open-dialog">
                    <div>New Book</div>
                    <img class="add-book-btn" src="./img/add-new.svg" height="75px" width="auto">
                </button>
            </div>
        </div>
    </header>

    <div class="book-collection-cntr"></div>

    <footer>
        <div>Logo is courtesy of <a href="https://unsplash.com/@publicdomainvectors/illustrations">Public Domain Vectors</a> at <a href="https://unsplash.com/">Unsplash</a> </div>
    </footer>

    <dialog id="new-book-dialog" closedby="any">
        <form>
            <label for="title">Book Title:</label>
            <input type="text" id="title">

            <label for="author">Author's Name:</label>
            <input type="text" id="author">

            <label for="pages">Page count:</label>
            <input type="number" id="pages">

            <label for="read">I've read it already:</label>
            <input type="checkbox" id="read">
            <input type="submit">
        </form>
    </dialog>
    
</body>
</html>
